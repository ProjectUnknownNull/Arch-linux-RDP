name: arch-rdp
on: workflow_dispatch

jobs:
  rdp:
    runs-on: ubuntu-latest
    steps:
      - name: Start Arch container with xrdp
        run: |
          docker run -d --name archrdp --privileged -p 3389:3389 archlinux:latest sleep infinity
          docker exec archrdp pacman -Syu --noconfirm
          docker exec archrdp pacman -S --noconfirm base-devel git sudo xfce4 xfce4-goodies
          docker exec archrdp useradd -m -s /bin/bash builduser
          docker exec archrdp bash -c "echo 'builduser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
          docker exec --user builduser archrdp bash -c "cd /home/builduser && git clone https://aur.archlinux.org/yay.git && cd yay && makepkg -si --noconfirm"
          docker exec --user builduser archrdp bash -c "yay -S --noconfirm xrdp xorgxrdp"
          docker exec archrdp useradd -m -s /bin/bash rdpuser
          docker exec archrdp bash -c "echo 'rdpuser:${{ secrets.RDP_PASSWORD }}' | chpasswd"
          docker exec archrdp bash -c "echo '#!/bin/bash' > /home/rdpuser/.xinitrc"
          docker exec archrdp bash -c "echo 'exec /usr/bin/xfce4-session' >> /home/rdpuser/.xinitrc"
          docker exec archrdp bash -c "chmod +x /home/rdpuser/.xinitrc"
          docker exec archrdp bash -c "chown rdpuser:rdpuser /home/rdpuser/.xinitrc"
          docker exec -d archrdp /usr/sbin/xrdp-sesman
          docker exec -d archrdp /usr/sbin/xrdp

      - name: Install and start Tailscale
        run: |
          curl -fsSL https://tailscale.com/install.sh | sh
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTHKEY }} --hostname=arch-rdp-runner
          tailscale ip -4

      - name: Stream xrdp logs and stay alive
        run: |
          docker exec archrdp bash -c "touch /var/log/xrdp.log /var/log/xrdp-sesman.log"
          docker exec archrdp tail -f /var/log/xrdp.log /var/log/xrdp-sesman.log &
          sleep 21000
